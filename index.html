<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Matrix Calculator</title>

        <link rel="stylesheet" type="text/css" href="style.css">
    </head>

    <body>
        <h2>Matrix Calculator</h2>

        <div class="tabs">
            <button onclick="showTab('single')">Single Matrix</button>
            <button onclick="showTab('double')">Double Matrix</button>
        </div>

        <div class="rowColSelector">
            Rows: <input type="number" id="rows" value="2" min="1">
            Cols: <input type="number" id="cols" value="2" min="1">
        </div>

        <div id="singleTab" class="tabContent">
            <button onclick="singleMatrixInputs = createMatrix('matrix', document.getElementById('rows').value, document.getElementById('cols').value);
            if (getElementById('rows').value != getElementById('cols').value) {
                document.getElementById('determinantButton').style.display = 'none';
                document.getElementById('traceButton').style.display = 'none';
                document.getElementById('powerContainer').style.display = 'none';
                document.getElementById('inverseButton').style.display = 'none';
                document.getElementById('operationButtonBreak').style.display = 'none';
                document.getElementById('singleResult').style.display = 'none';
            } else {
                document.getElementById('determinantButton').style.display = 'inline-block';
                document.getElementById('traceButton').style.display = 'inline-block';
                document.getElementById('powerContainer').style.display = 'inline-flex';
                document.getElementById('inverseButton').style.display = 'inline-block';
                document.getElementById('operationButtonBreak').style.display = 'block';
                document.getElementById('singleResult').style.display = 'block';
            }
            document.getElementById('singleMatrixOperationButtons').style.display = 'block';"
            class="createButton">
                Create Matrix</button>

            <div id="matrix" class="matrix"></div>

            <div class="operatorButtons" id="singleMatrixOperationButtons">
                <button onclick="displayResult(determinant(getMatrixValues(singleMatrixInputs)))" id="determinantButton">Determinant</button>
                <button onclick="displayResult(trace(getMatrixValues(singleMatrixInputs)))" id="traceButton">Trace</button>
                <div class="powerContainer" id="powerContainer">
                    <button class="powerButton" onclick="displayMatrix(power(getMatrixValues(singleMatrixInputs), document.getElementById('powerExp').value), 'singleMatrixResult')">
                        Power: 
                    </button>
                    <input type="number" class="powerInput" id="powerExp" value="2" min="1">
                </div>
                <br id="operationButtonBreak">
                <button onclick="displayMatrix(inverse(getMatrixValues(singleMatrixInputs)), 'singleMatrixResult')" id="inverseButton">Inverse</button>
                <button onclick="displayMatrix(rowReduce(getMatrixValues(singleMatrixInputs)), 'singleMatrixResult')"
                id="rowReduceButton">Row Reduce</button>
            </div>

            <div id="singleResult"></div>
            <math class="result">
                <mrow>
                    <mo>[</mo>
                    <mtable id="singleMatrixResult" rowspacing="1em"></mtable>
                    <mo>]</mo>
                </mrow>
            </math>
        </div>

        <div id="doubleTab" class="tabContent">

            <button onclick="matrixAInputs = createMatrix('matrixA', document.getElementById('rows').value, document.getElementById('cols').value)"
            class="createButton">Create First Matrix</button>
            <button onclick="matrixBInputs = createMatrix('matrixB', document.getElementById('rows').value, document.getElementById('cols').value)"
            class="createButton">Create Second Matrix</button>

            <div class="madeMatrices">
                <div id="matrixA" class="matrix"></div>
                <div id="operator"></div>
                <div id="matrixB" class="matrix"></div>
            </div>

            <div class="operatorButtons" style="display: block;">
                <button onclick="setOperator('+')">+</button>
                <button onclick="setOperator('-')">-</button>
                <button onclick="setOperator('X')">X</button>
            </div>

            <div class="calculate">
                <button onclick="calculate()">Calculate</button>
            </div>

            <math class="result">
                <mrow>
                    <mo>[</mo>
                    <mtable id="doubleMatrixResult" rowspacing="1em"></mtable>
                    <mo>]</mo>
                </mrow>
            </math>
        </div>
        <script src="script.js"></script>
    </body>
</html>
